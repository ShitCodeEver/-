{% extends "base.html" %}
{% load static %}
{% block title %}{{news.name}}{% endblock title %}
{% block content %}
    <div class="owl-carousel-wrapper">
  <div class="box-990099">
    <div>
      <div>
        <h1 class="text-uppercase mb-3">{{ news.name }}</h1>
        <p class="font-weight-bold mb-3 text-muted">{{ news.anons }}</p>
        <p class="mb-5" style="white-space: pre-line;">{{ news.full_text }}</p>
      </div>
    </div>
  </div>
  <div>
    <div class="ftco-cover-1" style="background-image: url('{% static 'images/hero_1.jpg' %}');"></div>
  </div>
</div>

{% endblock content %}
